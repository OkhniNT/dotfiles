#
# ███████╗██╗   ██╗███████╗██╗   ██╗ █████╗ ██████╗ ███████╗
# ██╔════╝╚██╗ ██╔╝██╔════╝██║   ██║██╔══██╗██╔══██╗██╔════╝
# ███████╗ ╚████╔╝ ███████╗██║   ██║███████║██████╔╝███████╗
# ╚════██║  ╚██╔╝  ╚════██║╚██╗ ██╔╝██╔══██║██╔══██╗╚════██║
# ███████║   ██║   ███████║ ╚████╔╝ ██║  ██║██║  ██║███████║
# ╚══════╝   ╚═╝   ╚══════╝  ╚═══╝  ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝
#                                                           


#                                     
# █   █ ███ █   █ ███ ███ ███ ███ ███ 
# ██ ██ █ █ ██  █  █   █  █ █ █ █ █   
# █ █ █ █ █ █ █ █  █   █  █ █ ██   █  
# █   █ █ █ █  ██  █   █  █ █ █ █   █ 
# █   █ ███ █   █ ███  █  ███ █ █ ███ 
#                                     
# See https://wiki.hyprland.org/Configuring/Monitors/

monitor = HDMI-A-1,   1920x1080,  1920x0, 1
monitor = DP-1,       1920x1080,  0x0,    1

wsbind = 1,     HDMI-A-1
wsbind = 2,     HDMI-A-1
wsbind = 3,     HDMI-A-1
wsbind = 4,     HDMI-A-1
wsbind = 5,     HDMI-A-1
wsbind = 6,     DP-1
wsbind = 7,     DP-1
wsbind = 8,     DP-1
wsbind = 9,     DP-1
wsbind = 10,    DP-1


#                               
# ███ █   █ █ █ █ █ ███ ███ ███ 
# █   ██  █ █ █ █ █ █ █ █ █ █   
# ███ █ █ █ █ █ █ █ █ █ ██   █  
# █   █  ██ █ █ █ █ ███ █ █   █ 
# ███ █   █  █   █  █ █ █ █ ███ 
#                               

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_bACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = XCURSOR_SIZE,24


#                 
# ███ █ █ ███ ███ 
# █   █ █ █   █   
# ███  █  ███ █   
# █   █ █ █   █   
# ███ █ █ ███ ███ 
#                 

exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY
exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = export $(dbus-launch)
exec-once = ~/.config/hypr/autostart

source = ~/.cache/wal/hyprcols.conf


# 
# ██╗  ██╗██╗   ██╗██████╗ ██████╗ ██╗   ██╗ █████╗ ██████╗ ███████╗
# ██║  ██║╚██╗ ██╔╝██╔══██╗██╔══██╗██║   ██║██╔══██╗██╔══██╗██╔════╝
# ███████║ ╚████╔╝ ██████╔╝██████╔╝██║   ██║███████║██████╔╝███████╗
# ██╔══██║  ╚██╔╝  ██╔═══╝ ██╔══██╗╚██╗ ██╔╝██╔══██║██╔══██╗╚════██║
# ██║  ██║   ██║   ██║     ██║  ██║ ╚████╔╝ ██║  ██║██║  ██║███████║
# ╚═╝  ╚═╝   ╚═╝   ╚═╝     ╚═╝  ╚═╝  ╚═══╝  ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝
#                                                                   
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/


#                               
# ███ ███ █   █ ███ ███ ███ █   
# █   █   ██  █ █   █ █ █ █ █   
# █   ███ █ █ █ ███ ██  █ █ █   
# █ █ █   █  ██ █   █ █ ███ █   
# ███ ███ █   █ ███ █ █ █ █ ███ 
#                               

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3

    layout = dwindle
}

misc {
    vfr = true
    # enable_swallow = true
    # swallow_regex = "^st-256color$"
}


#                       
# ███ █   █ ███ █ █ ███ 
#  █  ██  █ █ █ █ █  █  
#  █  █ █ █ ███ █ █  █  
#  █  █  ██ █   █ █  █  
# ███ █   █ █   ███  █  
#                       

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0
}

#                                   
# ███ ███ ███ █   █ ███ ███ ███ ███ 
# █   █ █ █   ██ ██ █    █   █  █   
# █   █ █  █  █ █ █ ███  █   █  █   
# █   █ █   █ █   █ █    █   █  █   
# ███ ███ ███ █   █ ███  █  ███ ███ 
#                                   

decoration {
    rounding = 8
    multisample_edges = true

    blur = true
    blur_size = 3
    blur_passes = 3
    blur_ignore_opacity = 0
    blur_new_optimizations = true
    blur_xray = false

    # blurls = eww-bar

    drop_shadow = false
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = quickEase, 0.16, 1, 0.3, 1

    animation = windows, 1, 5, quickEase, popin
    animation = windowsOut, 1, 5, quickEase, popin 90%
    animation = windowsMove, 1, 5, default, popin
    animation = border, 1, 5, quickEase
    animation = borderangle, 1, 5, quickEase, once
    animation = fade, 1, 7, quickEase
    animation = fadeOut, 1, 3, quickEase
    animation = workspaces, 1, 4, quickEase, slidevert
}


#                         
# █   ███ █ █ ███ █ █ ███ 
# █   █ █ █ █ █ █ █ █  █  
# █   █ █  █  █ █ █ █  █  
# █   ███  █  █ █ █ █  █  
# ███ █ █  █  ███ ███  █  
#                         

dwindle {
    pseudotile = yes
    preserve_split = yes
    force_split = 2
    no_gaps_when_only = false
}

master {
    new_is_master = false
}


# 
# ██╗    ██╗██╗███╗   ██╗██████╗ ██╗   ██╗██╗     ███████╗███████╗
# ██║    ██║██║████╗  ██║██╔══██╗██║   ██║██║     ██╔════╝██╔════╝
# ██║ █╗ ██║██║██╔██╗ ██║██████╔╝██║   ██║██║     █████╗  ███████╗
# ██║███╗██║██║██║╚██╗██║██╔══██╗██║   ██║██║     ██╔══╝  ╚════██║
# ╚███╔███╔╝██║██║ ╚████║██║  ██║╚██████╔╝███████╗███████╗███████║
#  ╚══╝╚══╝ ╚═╝╚═╝  ╚═══╝╚═╝  ╚═╝ ╚═════╝ ╚══════╝╚══════╝╚══════╝
#                                                                 

# Opacity Rules
windowrule = opacity 0.95 0.85, ^(st-256color)$
windowrule = opacity 0.5 0.5, ^(popterm)$

# General Rules
windowrule = tile, ^(Sxiv)$
windowrule = tile, ^(Minecraft Launcher)$

windowrule = pseudo, ^(R_x11)$

windowrule = float, ^(popterm)$
windowrule = float, title:^(Steam - News)$
windowrule = float, title:^(Friends List)$

# Firefox-Picture-in-Picture
windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin, title:^(Picture-in-Picture)$
windowrule = size 30% 30%, title:^(Picture-in-Picture)$
windowrule = move 1337 749, title:^(Picture-in-Picture)$


# 
# ██╗  ██╗███████╗██╗   ██╗██████╗ ██╗███╗   ██╗██████╗ ███████╗
# ██║ ██╔╝██╔════╝╚██╗ ██╔╝██╔══██╗██║████╗  ██║██╔══██╗██╔════╝
# █████╔╝ █████╗   ╚████╔╝ ██████╔╝██║██╔██╗ ██║██║  ██║███████╗
# ██╔═██╗ ██╔══╝    ╚██╔╝  ██╔══██╗██║██║╚██╗██║██║  ██║╚════██║
# ██║  ██╗███████╗   ██║   ██████╔╝██║██║ ╚████║██████╔╝███████║
# ╚═╝  ╚═╝╚══════╝   ╚═╝   ╚═════╝ ╚═╝╚═╝  ╚═══╝╚═════╝ ╚══════╝
#                                                               
# See https://wiki.hyprland.org/Configuring/Keywords/ for more

$mainMod = SUPER


#                                                       
# ███ ███ █   █ ███ ███ ███ █     ██  ███ █   █ ██  ███ 
# █   █   ██  █ █   █ █ █ █ █     █ █  █  ██  █ █ █ █   
# █   ███ █ █ █ ███ ██  █ █ █     ██   █  █ █ █ █ █  █  
# █ █ █   █  ██ █   █ █ ███ █     █ █  █  █  ██ █ █   █ 
# ███ ███ █   █ ███ █ █ █ █ ███   ██  ███ █   █ ██  ███ 
#                                                       

# Terminal binds
bind = $mainMod, Return, exec, $TERMINAL
bind = $mainMod, R, exec, $TERMINAL -e vifmrun
bind = $mainMod SHIFT, Return, exec, $TERMINAL -c popterm -g 60x20

# Application binds
bind = $mainMod, F2, exec, $BROWSER
bind = $mainMod, D, exec, $(tofi-run)
bind = $mainMod CTRL, b, exec, notify-send -r 1 " " "$(acpi | cut -d " " -f 4- | sed 's/,//;s/ /\n/g')"
bind = , Print, exec, font-awesome-select

# Media controls
binde = , XF86AudioLowerVolume, exec, volcontrols down
binde = , XF86AudioRaiseVolume, exec, volcontrols up
bind = , XF86AudioMute, exec, volcontrols mute
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
# Brightness controls
binde = , XF86MonBrightnessDown, exec, brightcontrols down
binde = , XF86MonBrightnessUp, exec, brightcontrols up
bind = SHIFT, XF86MonBrightnessDown, exec, brightcontrols min
bind = SHIFT, XF86MonBrightnessUp, exec, brightcontrols max


#                                         
# █ █ █ █ ███ ███   ██  ███ █   █ ██  ███ 
# █ █ █ █ █ █ █ █   █ █  █  ██  █ █ █ █   
# ███  █  ███ ██    ██   █  █ █ █ █ █  █  
# █ █  █  █   █ █   █ █  █  █  ██ █ █   █ 
# █ █  █  █   █ █   ██  ███ █   █ ██  ███ 
#                                         

bind = $mainMod, Q, killactive, 
bind = $mainMod SHIFT, Q, exit, 
bind = $mainMod, G, exec, $HOME/.config/hypr/scripts/gamemode
bind = $mainModCTRL, L, exec, $HOME/.config/hypr/scripts/dpms-toggle

# Universal window mod
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, S, togglefloating, 
bind = $mainMod, P, pin

# Dwindle binds
bind = $mainMod SHIFT, P, pseudo,
bind = $mainMod, V, togglesplit,

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
# Move active window in direction
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, Tab, workspace, previous

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Special workspace
bind = $mainMod, grave, togglespecialworkspace
bind = $mainMod SHIFT, grave, movetoworkspace, special

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
