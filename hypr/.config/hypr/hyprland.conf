# ‚Ėą‚Ėą‚Ėą ‚Ėą   ‚Ėą ‚Ėą   ‚Ėą‚Ėą‚Ėą  ‚Ėą  
#                       

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        scroll_factor = 0
    }

    sensitivity = 0
}

gestures {
    workspace_swipe = off
}


#                                   
# ‚Ėą‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą ‚Ėą   ‚Ėą ‚Ėą‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą 
