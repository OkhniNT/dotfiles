#                                                       

# Terminal binds
bind = $mainMod, Return, exec, $TERMINAL
bind = $mainMod, R, exec, $TERMINAL -e vifmrun
bind = $mainMod SHIFT, Return, exec, $TERMINAL -c popterm -g 60x20

# Application binds
bind = $mainMod, F2, exec, $BROWSER
bind = $mainMod, D, exec, $(tofi-run)
bind = $mainMod CTRL, b, exec, notify-send -r 1 "Ôóü ÔĀö" "$(acpi | cut -d " " -f 4- | sed 's/,//;s/ /\n/g')"
bind = , Print, exec, font-awesome-select

# Media controls
binde = , XF86AudioLowerVolume, exec, volcontrols down
binde = , XF86AudioRaiseVolume, exec, volcontrols up
bind = , XF86AudioMute, exec, volcontrols mute
bind = , XF86AudioPlay, exec, playerctl play-pause
# Brightness controls
binde = , XF86MonBrightnessDown, exec, brightcontrols down
binde = , XF86MonBrightnessUp, exec, brightcontrols up
bind = SHIFT, XF86MonBrightnessDown, exec, brightcontrols min
bind = SHIFT, XF86MonBrightnessUp, exec, brightcontrols max


#                                         
# ‚Ėą ‚Ėą ‚Ėą ‚Ėą ‚Ėą‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą   ‚Ėą‚Ėą  ‚Ėą‚Ėą‚Ėą ‚Ėą   ‚Ėą ‚Ėą‚Ėą  ‚Ėą‚Ėą‚Ėą 
# ‚Ėą ‚Ėą ‚Ėą ‚Ėą ‚Ėą ‚Ėą ‚Ėą ‚Ėą   ‚Ėą ‚Ėą  ‚Ėą  ‚Ėą‚Ėą  ‚Ėą ‚Ėą ‚Ėą ‚Ėą   
# ‚Ėą‚Ėą‚Ėą  ‚Ėą  ‚Ėą‚Ėą‚Ėą ‚Ėą‚Ėą    ‚Ėą‚Ėą   ‚Ėą  ‚Ėą ‚Ėą ‚Ėą ‚Ėą ‚Ėą  ‚Ėą  
# ‚Ėą ‚Ėą  ‚Ėą  ‚Ėą   ‚Ėą ‚Ėą   ‚Ėą ‚Ėą  ‚Ėą  ‚Ėą  ‚Ėą‚Ėą ‚Ėą ‚Ėą   ‚Ėą 
# ‚Ėą ‚Ėą  ‚Ėą  ‚Ėą   ‚Ėą ‚Ėą   ‚Ėą‚Ėą  ‚Ėą‚Ėą‚Ėą ‚Ėą   ‚Ėą ‚Ėą‚Ėą  ‚Ėą‚Ėą‚Ėą 
#                                         

bind = $mainMod, Q, killactive, 
bind = $mainMod SHIFT, Q, exit, 
bind = $mainMod, G, exec, $HOME/.config/hypr/scripts/gamemode

# Universal window mod
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, S, togglefloating, 
bind = $mainMod, P, pin

# Dwindle binds
bind = $mainMod SHIFT, P, pseudo,
bind = $mainMod, V, togglesplit,

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
# Move active window in direction
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, Tab, workspace, previous

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Special workspace
bind = $mainMod, grave, togglespecialworkspace
bind = $mainMod SHIFT, grave, movetoworkspace, special

# Window Groups
bind = $mainMod, bracketright, togglegroup
bind = $mainMod, bracketleft, changegroupactive

# Resize mode
bind = $mainMod, X, exec, notify-send -r 3 "Resize Mode"
bind = $mainMod, X, submap, resize
submap = resize

binde = , H, resizeactive, -20 0
binde = , J, resizeactive, 0 20
binde = , K, resizeactive, 0 -20
binde = , L, resizeactive, 20 0

bind = , 1, splitratio, -0.25
bind = , 2, splitratio, 0.25

bind = , escape, exec, notify-send -r 3 "[Resize Mode]"
bind = , escape, submap, reset

submap = reset

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
